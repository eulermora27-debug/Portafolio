<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio fotográfico by Euler Solarte M.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
        header { padding: 80px 20px 40px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        h1 { font-weight: 200; letter-spacing: 2px; text-transform: uppercase; font-size: 1.3rem; margin: 0; }

        /* Cuadrícula de fotos (Grid) */
        .gallery-container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .photo-card { background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        .photo-card img {
            width: 100%;
            height: 300px; /* Tamaño controlado */
            object-fit: cover;
            border-radius: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .photo-info { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .photo-title { font-size: 0.7rem; letter-spacing: 1px; color: #999; text-transform: uppercase; margin: 0; }

        .like-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: #eee; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .like-btn.liked { color: #ff4757; }
        .like-count { font-size: 0.8rem; color: #666; font-weight: 500; }

        footer { padding: 60px 20px; text-align: center; background: #fafafa; border-top: 1px solid #eee; margin-top: 50px; font-size: 0.85rem; color: #444; }
        .contact { color: #888; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .contact:hover { color: #000; border-bottom: 1px solid #000; }

        @media (max-width: 600px) { .gallery { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>Portafolio fotográfico by Euler Solarte M.</h1>
    </header>

    <main class="gallery-container">
        <div id="gallery" class="gallery"></div>
    </main>

    <footer>
        <div><strong>Euler Solarte M.</strong></div>
        <div style="margin-top:10px;">
            Contacto: <a href="mailto:eulermora27@gmail.com" class="contact">eulermora27@gmail.com</a>
        </div>
    </footer>

    <script>
        // === TU CONFIGURACIÓN DE FIREBASE ===
        // Búscala en: Engranaje (Configuración) -> Configuración del proyecto -> Tus Apps (Icono </>)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "portafolio-5a15c.firebaseapp.com",
            databaseURL: "https://portafolio-5a15c-default-rtdb.firebaseio.com",
            projectId: "portafolio-5a15c",
            storageBucket: "portafolio-5a15c.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        fetch('./config.json')
            .then(res => res.ok ? res.json() : { photos: [] })
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.photos.forEach((photo, index) => {
                    // Crear ID único basado en el título
                    const id = 'id_' + (photo.title || 'img').replace(/\s+/g, '').toLowerCase() + index;
                    
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <img src="${photo.image}" alt="${photo.title}" loading="lazy">
                        <div class="photo-info">
                            <h2 class="photo-title">${photo.title}</h2>
                            <button id="btn-${id}" class="like-btn" onclick="votar('${id}')">
                                <span id="count-${id}" class="like-count">0</span> ❤
                            </button>
                        </div>
                    `;
                    gallery.appendChild(card);
                    
                    // Escuchar likes en tiempo real
                    db.ref('likes/' + id).on('value', (snap) => {
                        document.getElementById('count-' + id).innerText = snap.val() || 0;
                        if (localStorage.getItem('liked_' + id)) document.getElementById('btn-' + id).classList.add('liked');
                    });
                });
            });

        function votar(id) {
            if (localStorage.getItem('liked_' + id)) return;
            db.ref('likes/' + id).transaction(c => (c || 0) + 1);
            localStorage.setItem('liked_' + id, 'true');
            document.getElementById('btn-' + id).classList.add('liked');
        }
    </script>
</body>
</html>
