<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Fotográfico | Euler SM</title>
    <style>
        /* Estética Minimalista y Sobria */
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #ffffff; color: #111; margin: 0; padding: 0; line-height: 1.6; }
        
        /* CABECERA: Nombre y Título */
        header { padding: 120px 20px 80px 20px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 6px; text-transform: uppercase; font-size: 1.6rem; margin: 0; }
        .site-title { font-size: 0.7rem; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin-top: 10px; }

        /* GALERÍA */
        .gallery { max-width: 1100px; margin: auto; padding: 20px; }
        .photo-item { margin-bottom: 120px; text-align: center; }
        img { width: 100%; height: auto; display: block; margin-bottom: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); border-radius: 2px; }
        .photo-info { font-size: 0.7rem; letter-spacing: 3px; color: #ccc; text-transform: uppercase; margin-bottom: 20px; }

        /* SECCIÓN DE INTERACCIÓN */
        .interaction-container { max-width: 800px; margin: 40px auto; padding: 20px; border-top: 1px solid #f0f0f0; }

        /* PIE DE PÁGINA: Autor y Contacto */
        footer { padding: 80px 20px; text-align: center; background: #fafafa; border-top: 1px solid #f0f0f0; margin-top: 100px; }
        .author-name { font-weight: 400; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 5px; }
        .author-email { font-size: 0.8rem; color: #888; text-decoration: none; transition: 0.3s; }
        .author-email:hover { color: #000; border-bottom: 1px solid #000; }

        @media (max-width: 768px) {
            header { padding: 80px 20px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Euler SM</h1>
        <div class="site-title">Trabajos Fotográficos</div>
    </header>

    <main id="gallery" class="gallery">
        </main>

    <section class="interaction-container">
        <h2 style="font-size: 0.7rem; letter-spacing: 2px; color: #ccc; text-transform: uppercase; text-align: center; margin-bottom: 30px;">Interacción</h2>
        <div class="giscus"></div>
    </section>

    <footer>
        <div class="author-name">Autor: Euler SM</div>
        <a href="mailto:eulermora27@gmail.com" class="author-email">eulermora27@gmail.com</a>
    </footer>

    <script>
        fetch('./config.json')
            .then(res => res.ok ? res.json() : { photos: [] })
            .then(data => {
                const gallery = document.getElementById('gallery');
                if (data.photos && data.photos.length > 0) {
                    data.photos.forEach(photo => {
                        gallery.innerHTML += `
                            <article class="photo-item">
                                <img src="${photo.image}" alt="${photo.title}" loading="lazy">
                                <div class="photo-title">${photo.title}</div>
                            </article>`;
                    });
                }
            });
    </script>

    <script src="https://giscus.app/client.js"
        data-repo="eulermora27-debug/Portafolio"
        data-repo-id="PON_AQUÍ_TU_REPO_ID" 
        data-category="Announcements"
        data-category-id="PON_AQUÍ_TU_CATEGORY_ID"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="light"
        data-lang="es"
        crossorigin="anonymous"
        async>
    </script>

</body>
</html>
