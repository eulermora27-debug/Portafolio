    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
        
        /* CABECERA: Título solicitado */
        header { padding: 80px 20px 40px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        h1 { font-weight: 200; letter-spacing: 2px; text-transform: uppercase; font-size: 1.3rem; margin: 0; color: #000; }

        /* Cuadrícula (Grid) - Imágenes no gigantes */
        .gallery-container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 50px;
            align-items: start;
        }

        .photo-card { background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        
        /* IMAGEN: Proporción real sin cortes */
        .photo-card img {
            width: 100%;
            height: auto; 
            display: block;
            border-radius: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .photo-info { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .photo-title { font-size: 0.65rem; letter-spacing: 1.5px; color: #999; text-transform: uppercase; margin: 0; }

        /* BOTÓN DE LIKE: Siempre Negro */
        .like-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem; 
            color: #000; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: opacity 0.2s; 
            padding: 0; 
        }

        .like-btn:active { opacity: 0.4; }
        .like-count { font-size: 0.8rem; color: #000; font-weight: 400; }

        /* PIE DE PÁGINA: Datos de autor */
        footer { padding: 80px 20px; text-align: center; background: #fafafa; border-top: 1px solid #eee; margin-top: 60px; font-size: 0.85rem; color: #000; }
        .contact-link { color: #666; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .contact-link:hover { border-bottom: 1px solid #000; color: #000; }

        @media (max-width: 600px) { .gallery { grid-template-columns: 1fr; } }
    </style>
</head>
