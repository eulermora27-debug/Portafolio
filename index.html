<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio fotográfico - Euler Solarte M.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
        header { padding: 80px 20px 40px; text-align: center; border-bottom: 1px solid #f2f2f2; }
        h1 { font-weight: 200; letter-spacing: 2px; text-transform: uppercase; font-size: 1.3rem; margin: 0; color: #000; }

        .gallery-container { max-width: 1200px; margin: auto; padding: 40px 20px; min-height: 400px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 50px;
            align-items: start;
        }

        .photo-card { background: #fff; display: flex; flex-direction: column; }
        .photo-card img {
            width: 100%;
            height: auto; 
            display: block;
            border-radius: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            background: #eee; /* Color de fondo mientras carga */
        }

        .photo-info { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .photo-title { font-size: 0.65rem; letter-spacing: 1.5px; color: #999; text-transform: uppercase; margin: 0; }

        .like-btn { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem; 
            color: #000; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 0; 
        }
        .like-count { font-size: 0.8rem; color: #000; font-weight: 400; }

        footer { padding: 80px 20px; text-align: center; background: #fafafa; border-top: 1px solid #eee; margin-top: 60px; font-size: 0.85rem; }
        .contact-link { color: #666; text-decoration: none; }

        @media (max-width: 600px) { .gallery { grid-template-columns: 1fr; } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <h1>Portafolio fotográfico - Euler Solarte M.</h1>
    </header>

    <main class="gallery-container">
        <div id="gallery" class="gallery">
            <p id="loading-msg" style="text-align:center; color:#999; grid-column: 1/-1;">Cargando galería...</p>
        </div>
    </main>

    <footer>
        <div><strong>Euler Solarte M.</strong></div>
        <div style="margin-top:10px;">
            <a href="mailto:eulermora27@gmail.com" class="contact-link">eulermora27@gmail.com</a>
        </div>
    </footer>

    <script>
        // 1. Datos de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBlNVY7m79LpX899r4qfD08B8t1G4M738U",
            authDomain: "portafolio-5a15c.firebaseapp.com",
            databaseURL: "https://portafolio-5a15c-default-rtdb.firebaseio.com",
            projectId: "portafolio-5a15c",
            storageBucket: "portafolio-5a15c.appspot.com",
            messagingSenderId: "367375252877",
            appId: "1:367375252877:web:80695427863773950b6911"
        };

        // Inicializar Firebase con protección por si falla
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) {
            console.error("Error al iniciar Firebase:", e);
        }

        // 2. Cargar fotos desde el JSON
        fetch('./config.json')
            .then(res => {
                if (!res.ok) throw new Error("No se pudo cargar config.json");
                return res.json();
            })
            .then(data => {
                const gallery = document.getElementById('gallery');
                const loadingMsg = document.getElementById('loading-msg');
                
                if (data.photos && data.photos.length > 0) {
                    loadingMsg.style.display = 'none'; // Quitar mensaje de carga
                    
                    data.photos.forEach((photo, index) => {
                        const id = 'id_' + (photo.title || 'img').replace(/\s+/g, '').toLowerCase() + index;
                        
                        const card = document.createElement('div');
                        card.className = 'photo-card';
                        card.innerHTML = `
                            <img src="${photo.image}" alt="${photo.title}" onerror="this.src='https://via.placeholder.com/400x300?text=Error+al+cargar+imagen'">
                            <div class="photo-info">
                                <h2 class="photo-title">${photo.title}</h2>
                                <div class="like-container" style="display:flex; align-items:center; gap:8px;">
                                    <span id="count-${id}" class="like-count">0</span>
                                    <button id="btn-${id}" class="like-btn" onclick="votar('${id}')">❤</button>
                                </div>
                            </div>
                        `;
                        gallery.appendChild(card);
                        
                        // Conectar a Firebase si está disponible
                        if (db) {
                            db.ref('likes/' + id).on('value', (snap) => {
                                const countEl = document.getElementById('count-' + id);
                                if (countEl) countEl.innerText = snap.val() || 0;
                            });
                        }
                    });
                } else {
                    loadingMsg.innerText = "No hay fotos configuradas en config.json.";
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loading-msg').innerText = "Error: Asegúrate de que el archivo config.json exista y sea correcto.";
            });

        function votar(id) {
            if (!db) return alert("El sistema de likes no está disponible.");
            if (localStorage.getItem('liked_' + id)) return;
            
            db.ref('likes/' + id).transaction(c => (c || 0) + 1);
            localStorage.setItem('liked_' + id, 'true');
        }
    </script>
</body>
</html>
