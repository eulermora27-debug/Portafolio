<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Fotográfico</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
        header { padding: 80px 20px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; font-size: 1.2rem; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
            max-width: 1400px; 
            margin: auto; 
        }
        .photo-item { margin-bottom: 40px; }
        img { width: 100%; height: auto; filter: grayscale(20%); transition: 0.5s; }
        img:hover { filter: grayscale(0%); }
        .info { padding: 15px 0; font-size: 0.8rem; letter-spacing: 1px; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <h1>Tu Nombre | Fotografía</h1>
    </header>
    <main id="gallery" class="gallery">
        </main>

    <script>
        // Este código lee las fotos de tu carpeta de imágenes
        fetch('./config.json') // Necesitaremos este archivo para listar las fotos
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                data.photos.forEach(photo => {
                    gallery.innerHTML += `
                        <div class="photo-item">
                            <img src="${photo.image}" alt="${photo.title}">
                            <div class="info">${photo.title}</div>
                        </div>`;
                });
            });
    </script>
</body>
</html>
